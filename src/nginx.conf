# LiteAdmin — nginx server block
#
# Copy into your sites-available/ (or http {} include) and adjust:
#   - server_name
#   - root            -> the src/ folder
#   - fastcgi_pass    -> your php-fpm socket or 127.0.0.1:9000
# Then reload nginx.

server {
    listen 80;
    # listen 443 ssl http2;   # recommended: terminate TLS here
    server_name liteadmin.example.com;

    root /var/www/liteadmin/src;
    index index.php;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy same-origin;

    # Never serve secrets, the shared library, raw database files or the data dir.
    location = /config.json { deny all; return 403; }
    location = /lib.php     { deny all; return 403; }
    location ^~ /databases/  { deny all; return 403; }
    location ~* \.(sqlite|sqlite3|db)(-wal|-shm|-journal)?$ { deny all; return 403; }

    # i18n/*.json and everything under js/ css/ vendor/ are served statically.
    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $https if_not_empty;
    }

    # Long-cache the vendored assets (immutable libraries & fonts).
    location /vendor/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
